<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="breadcrumbs">
    <a href="products.html">← Back to Products</a>
  </nav>

  <main class="product-details">
    <div class="product-image">
      <img src="https://www.apple.com/v/iphone/home/cb/images/overview/select/iphone_16pro__erw9alves2qa_large_2x.png" alt="Sample Product" />
    </div>
    <div class="product-info">
      <h1>Sample Product Title</h1>
      <p class="product-description">
        This is a full description of the sample product. It outlines key features, usage, and benefits in detail.
      </p>

      <table class="product-specs">
        <tr>
          <th>Specification</th>
          <th>Details</th>
        </tr>
        <tr>
          <td>Weight</td>
          <td>1.2 kg</td>
        </tr>
        <tr>
          <td>Dimensions</td>
          <td>25 × 15 × 10 cm</td>
        </tr>
        <tr>
          <td>Material</td>
          <td>Aluminum</td>
        </tr>
      </table>

      <div class="product-purchase">
        <p class="price">$129.99</p>
        <button class="add-to-cart">Add to Cart</button>
      </div>
    </div>
  </main>
</body>
</html>
