<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Promotions</title>
  <link rel="stylesheet" href="../styles/universal.css" />
</head>
<body>
  <header>
    <h1 class="promo-header">Special Offers & Promotions</h1>
  </header>

  <section class="promotions-container">
    <div class="promo-card">
      <img src="images/promo1.jpg" alt="Promotion 1" class="promo-image" />
      <h2 class="promo-title">Summer Sale - Up to 50% Off</h2>
      <p class="promo-description">Grab the best summer fashion at unbeatable prices.</p>
      <a href="#" class="shop-now-button">Shop Now</a>
    </div>

    <div class="promo-card">
      <img src="images/promo2.jpg" alt="Promotion 2" class="promo-image" />
      <h2 class="promo-title">Buy One Get One Free</h2>
      <p class="promo-description">Limited time offer on selected accessories.</p>
      <a href="#" class="shop-now-button">Shop Now</a>
    </div>

    <div class="promo-card">
      <img src="images/promo3.jpg" alt="Promotion 3" class="promo-image" />
      <h2 class="promo-title">Free Shipping This Weekend</h2>
      <p class="promo-description">Enjoy free delivery on all orders above $50.</p>
      <a href="#" class="shop-now-button">Shop Now</a>
    </div>
  </section>
</body>
</html>
