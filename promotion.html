<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Promotions</title>
</head>
<body>
    <header>
        <h1>Our Latest Promotions</h1>
    </header>

    <section class="promotions">
        <div class="promotion">
            <img src="promo1.jpg" alt="Promo 1">
            <h2>Buy One, Get One Free</h2>
            <p>Get a second phone free when you buy a selected model.</p>
            <button>Shop Now</button>
        </div>

        <div class="promotion">
            <img src="promo2.jpg" alt="Promo 2">
            <h2>20% Off All Accessories</h2>
            <p>Enjoy a 20% discount on all mobile accessories this month.</p>
            <button>Shop Now</button>
        </div>

        <div class="promotion">
            <img src="promo3.jpg" alt="Promo 3">
            <h2>Free Shipping</h2>
            <p>Get free shipping on all orders above $50.</p>
            <button>Shop Now</button>
        </div>
    </section>
</body>
</html>
